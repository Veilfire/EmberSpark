# SparkRuntime config for Docker LAN deployment.
#
# Binds to 0.0.0.0:7777 with a 192.168.0.0/16 allowlist (no TLS).
# Credentials rotate every startup and are printed to the console once.
#
# Edit allowed_cidrs to narrow to your specific subnet if desired,
# e.g. 192.168.1.0/24 for a single home network.

apiVersion: spark.veilfire.dev/v1alpha1
kind: SparkRuntime
metadata:
  name: docker-lan
spec:
  web:
    enabled: true
    bind:
      mode: lan
      host: 0.0.0.0
      port: 7777
      allowed_cidrs:
        - 192.168.0.0/16
        - 10.0.0.0/8
    credentials:
      rotate_on_startup: true
  data_volume:
    enabled: true
    root: /data/spark-volume
    chroma_subdir: chroma
    scratch_subdir: scratch
    deliverables_subdir: deliverables
    sqlite_on_volume: true
