apiVersion: spark.veilfire.dev/v1alpha1
kind: Agent
metadata:
  name: research-assistant

spec:
  description: >
    Web-research agent. Searches + fetches + extracts + summarizes into a
    markdown digest landing in the deliverables directory.

  runtime:
    provider:
      type: anthropic
      model: claude-opus-4-6
      api_key_ref: anthropic_key
      temperature: 0.2
    max_iterations: 15
    max_model_calls: 40
    max_tool_calls: 30
    max_runtime_seconds: 1200
    privacy_mode: strict
    reflection: true

  memory:
    task_memory: true
    session_memory:
      enabled: true
      max_entries: 200
    long_term_memory:
      enabled: true
      namespace: research-assistant
      backend: chroma
      collection: research_assistant_memory
      persist_path: ~/.spark/chroma
      embedder:
        provider: sentence_transformers
        model: BAAI/bge-small-en-v1.5
      retrieval:
        top_k: 6
        min_score: 0.72
      retention:
        default_class: review

  plugins:
    allow:
      - web_search
      - http_tool
      - markdown_writer

  permissions:
    filesystem:
      allow_paths: []
      deny_paths:
        - ~/.ssh
        - ~/.config
    network:
      allow_hosts:
        - api.search.brave.com
        - google.serper.dev
        - api.tavily.com
        - html.duckduckgo.com
        - api.bing.microsoft.com
    sandbox:
      enabled: true
      backend: auto
      cpu_seconds: 60
      memory_mb: 1024
    grants:
      - fs.write
      - net.http
      - secrets.read

  logging:
    level: info
    raw_prompts: false
    raw_model_outputs: false
    local_path: ~/.spark/logs
