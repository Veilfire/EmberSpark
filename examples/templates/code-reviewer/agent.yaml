apiVersion: spark.veilfire.dev/v1alpha1
kind: Agent
metadata:
  name: code-reviewer

spec:
  description: >
    Reads a local git repo's diff against a baseline and writes a
    markdown review to deliverables.

  runtime:
    provider:
      type: anthropic
      model: claude-opus-4-6
      api_key_ref: anthropic_key
      temperature: 0.1
    max_iterations: 20
    max_model_calls: 50
    max_tool_calls: 40
    max_runtime_seconds: 1800
    privacy_mode: strict
    reflection: true

  memory:
    task_memory: true
    session_memory:
      enabled: true
      max_entries: 150
    long_term_memory:
      enabled: true
      namespace: code-reviewer
      backend: chroma
      collection: code_reviewer_memory
      persist_path: ~/.spark/chroma
      embedder:
        provider: sentence_transformers
        model: BAAI/bge-small-en-v1.5

  plugins:
    allow:
      - git
      - filesystem
      - markdown_writer

  permissions:
    filesystem:
      allow_paths: []
      deny_paths:
        - ~/.ssh
        - ~/.config
    network:
      allow_hosts: []
    sandbox:
      enabled: true
      backend: auto
      cpu_seconds: 60
      memory_mb: 1024
    grants:
      - fs.read
      - fs.write
      - fs.list
      - subprocess

  logging:
    level: info
    raw_prompts: false
    raw_model_outputs: false
    local_path: ~/.spark/logs
