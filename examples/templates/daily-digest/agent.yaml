apiVersion: spark.veilfire.dev/v1alpha1
kind: Agent
metadata:
  name: daily-digest

spec:
  description: >
    Polls RSS/Atom feeds, summarizes new items, writes a daily markdown
    digest to deliverables, and emails it.

  runtime:
    provider:
      type: anthropic
      model: claude-sonnet-4-6
      api_key_ref: anthropic_key
      temperature: 0.2
    max_iterations: 12
    max_model_calls: 30
    max_tool_calls: 25
    max_runtime_seconds: 900
    privacy_mode: strict
    reflection: true

  memory:
    task_memory: true
    session_memory:
      enabled: true
      max_entries: 100
    long_term_memory:
      enabled: true
      namespace: daily-digest
      backend: chroma
      collection: daily_digest_memory
      persist_path: ~/.spark/chroma
      embedder:
        provider: sentence_transformers
        model: BAAI/bge-small-en-v1.5

  plugins:
    allow:
      - rss_reader
      - http_tool
      - markdown_writer
      - email_sender

  permissions:
    filesystem:
      allow_paths: []
      deny_paths:
        - ~/.ssh
        - ~/.config
    network:
      allow_hosts: []
    sandbox:
      enabled: true
      backend: auto
      cpu_seconds: 60
      memory_mb: 1024
    grants:
      - fs.read
      - fs.write
      - net.http
      - secrets.read

  logging:
    level: info
    raw_prompts: false
    raw_model_outputs: false
    local_path: ~/.spark/logs
