apiVersion: spark.veilfire.dev/v1alpha1
kind: Agent
metadata:
  name: inbox-processor

spec:
  description: >
    Classifies files dropped into a local inbox directory and moves them
    into category subdirectories. Optionally emails a summary.

  runtime:
    provider:
      type: anthropic
      model: claude-haiku-4-5
      api_key_ref: anthropic_key
      temperature: 0.1
    max_iterations: 10
    max_model_calls: 20
    max_tool_calls: 30
    max_runtime_seconds: 600
    privacy_mode: strict
    reflection: false

  memory:
    task_memory: true
    session_memory:
      enabled: true
      max_entries: 50

  plugins:
    allow:
      - filesystem
      - markdown_writer
      - email_sender

  permissions:
    filesystem:
      allow_paths: []
      deny_paths:
        - ~/.ssh
        - ~/.config
    network:
      allow_hosts: []
    sandbox:
      enabled: true
      backend: auto
      cpu_seconds: 30
      memory_mb: 512
    grants:
      - fs.read
      - fs.write
      - fs.list
      - net.http
      - secrets.read

  logging:
    level: info
    raw_prompts: false
    raw_model_outputs: false
    local_path: ~/.spark/logs
